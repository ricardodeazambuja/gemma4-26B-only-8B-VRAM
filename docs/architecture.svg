<svg xmlns="http://www.w3.org/2000/svg" width="720" height="280" viewBox="0 0 720 280" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#57606a"/>
    </marker>
  </defs>

  <!-- pi client -->
  <rect x="16" y="108" width="92" height="56" rx="10" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="62" y="133" font-size="17" font-weight="700" fill="#1f2328" text-anchor="middle">pi</text>
  <text x="62" y="151" font-size="10.5" fill="#656d76" text-anchor="middle">coding agent</text>

  <!-- arrow: pi -> server -->
  <line x1="110" y1="136" x2="160" y2="136" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="135" y="126" font-size="9.5" fill="#656d76" text-anchor="middle">HTTP</text>

  <!-- llama-server container -->
  <rect x="166" y="40" width="538" height="200" rx="12" fill="#ffffff" stroke="#1f2328" stroke-width="1.5"/>
  <text x="435" y="66" font-size="15" font-weight="700" fill="#1f2328" text-anchor="middle">llama-server &#183; OpenAI API :8080</text>

  <!-- GPU box -->
  <rect x="190" y="84" width="490" height="62" rx="9" fill="#eaffea" stroke="#2ea043"/>
  <text x="206" y="106" font-size="13" font-weight="700" fill="#1a7f37">GPU &#183; 8 GB VRAM</text>
  <text x="206" y="128" font-size="12" fill="#1f2328">attention layers &#160;+&#160; KV cache (your context) &#160;+&#160; N expert layers</text>

  <!-- RAM box -->
  <rect x="190" y="158" width="490" height="62" rx="9" fill="#f6f8fa" stroke="#8b949e"/>
  <text x="206" y="180" font-size="13" font-weight="700" fill="#57606a">System RAM</text>
  <text x="206" y="202" font-size="12" fill="#1f2328">the remaining MoE expert FFN weights</text>
  <text x="664" y="202" font-size="11.5" font-weight="700" fill="#57606a" text-anchor="end">--cpu-moe</text>
</svg>
